name: BEAKON RTX Data Refresh

on:
  schedule:
    - cron: '0 6 */5 * *'   # Every 5 days at 06:00 UTC
  workflow_dispatch:          # Allow manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run RTX data refresh
        run: python data_refresh_rtx.py

      - name: Commit and push data_rtx.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-refresh: RTX job data update"
          file_pattern: data_rtx.json
